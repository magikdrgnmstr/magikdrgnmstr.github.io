<!DOCTYPE html>
<html>
<head>
    <title>Resume - Michael Ludwig</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body {
            background-image: url("R2-01001-0019.jpg");
            background-size: cover;
            background-attachment: fixed;
            color: white;
            font-family: sans-serif;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            font-size: 20px;
        }
        h1 { font-size: 54px; margin-bottom: 10px; color: yellow; text-align: center; }
        nav ul li a { font-size: 28px; color: Orange; }
        header { background: rgba(0, 0, 0, 0.5); padding: 25px; border-radius: 8px; text-align: center; }
        
        /* 📦 The Container for the two columns */
        .main-content {
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            gap: 30px; /* Space between PDF and Sidebar */
            padding: 20px;
        }

        /* 🖼️ PDF Frame restricted and aligned left */
        .pdf-frame {
            border: 8px solid #2f2f2f;
            border-radius: 5px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            width: 60%; /* Adjusted width to leave room on right */
            background: rgba(0,0,0,0.3);
        }

        /* 📝 Sidebar for future links/text */
        .sidebar {
            width: 35%; 
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #00ffff;
        }

        .btn {
            display: inline-block;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 20px;
            text-decoration: none;
            margin: 10px 0;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            font-weight: bold;
            width: 80%; /* Makes buttons fit the sidebar nicely */
            text-align: center;
        }
        .linkedin-btn { background-color: #0077B5; color: white !important; }
        .download-btn { background-color: #28a745; color: white !important; }
        .btn:hover { box-shadow: 0 0 15px #00ffff; transform: scale(1.05); }

        nav ul { list-style: none; padding: 0; }
        nav li { display: inline-block; margin: 0 20px; }
        a { color: #00ffff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>Michael Ludwig's Resume</h1>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="Welcome.html">Welcome</a></li>
            <li><a href="CompanyBackground.html">Company Background</a></li>
            <li><a href="Certificates.html">Certificates</a></li>
            <li><a href="Contact.html">Contact</a></li>
        </ul>
    </nav>
</header>

<hr>

<!-- COLUMN WRAPPER -->
<div class="main-content">
    
    <!-- LEFT SIDE: PDF -->
    <div class="pdf-frame">
        <embed src="Mike LI Profile.pdf" type="application/pdf" width="100%" height="700px" />
    </div>

    <!-- RIGHT SIDE: Sidebar for future content -->
    <div class="sidebar">
        <h2 style="color: yellow;">Quick Links</h2>
        <a href="https://linkedin.com" target="_blank" class="btn linkedin-btn">
            <i class="fab fa-linkedin"></i> LinkedIn Profile
        </a>
        <a href="Mike LI Profile.pdf" download class="btn download-btn">
            <i class="fas fa-file-download"></i> Download Resume
        </a>
        
        <p style="margin-top: 20px;">
            <b style="color: Orange;">Future Content:</b><br>
            You can now add extra descriptions, contact info, or technical skills lists in this space!
        </p>

        <a href="index.html" style="font-size: 20px; color: #00ffff;">Return to Home</a>
    </div>

</div>

</body>
</html>
