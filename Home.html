<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
    <style>
        body {
            /* Fixes the background image */
            background-image: url("Ludovico 1.jpg");
            background-size: cover;
            background-attachment: fixed;
            /* Changes main text to White */
            color: white;
            font-family: sans-serif;
            
            /* Center the text globally */
            text-align: center; 
        }

        /* Removes bullets and centering for the list */
        ul {
            list-style-type: none;
            padding: 0;
        }

        /* Makes the links sit side-by-side (optional, but looks better centered) */
        li {
            display: inline-block;
            margin: 0 15px;
        }

        /* Changes the color of your links */
        a {
            color: #00ffff; /* Bright Cyan */
            text-decoration: none;
            font-weight: bold;
        }

        /* Changes color when you hover over a link */
        a:hover {
            color: #ffffff;
            text-decoration: underline;
        }
    </style>
</head>
<body>

        <h1>Home</h1>

                <li><a href="Contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
</body>
</html>
